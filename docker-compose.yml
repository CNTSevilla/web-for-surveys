version: '3.8'
services:
  db:
    image: mysql:8.0
    container_name: familiaspalmete-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: familiaspalmete
      MYSQL_USER: familiaspalmete
      MYSQL_PASSWORD: familiaspalmete
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  db_data:
